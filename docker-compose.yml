x-app-base: &app-base
  build: api/.
  profiles: ["full-stack"]
  deploy:
    resources:
      limits:
        cpus: "0.35"
        memory: "100MB"
  environment: &app-env
    NODE_ENV: production
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    DEFAULT_PAYMENT_PROCESSOR_BASE_URL: http://payment-processor-default:8080
    FALLBACK_PAYMENT_PROCESSOR_BASE_URL: http://payment-processor-fallback:8080
  networks:
    - rinha-de-backend
    - payment-processor
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

x-worker-base: &worker-base
  build: worker/.
  profiles: ["full-stack"]
  deploy:
    resources:
      limits:
        cpus: "0.30"
        memory: "100MB"
  environment:
    NODE_ENV: production
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    DEFAULT_PAYMENT_PROCESSOR_BASE_URL: http://payment-processor-default:8080
    FALLBACK_PAYMENT_PROCESSOR_BASE_URL: http://payment-processor-fallback:8080
  networks:
    - rinha-de-backend
    - payment-processor
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  nginx:
    image: nginx:alpine
    container_name: rinha-de-backend-nginx
    profiles: ["full-stack"]
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    networks:
      - rinha-de-backend
    depends_on:
      - api1
      - api2
    restart: unless-stopped

  api1:
    <<: *app-base
    container_name: rinha-de-backend-api1
    environment:
      <<: *app-env
      PORT: 3000

  api2:
    <<: *app-base
    container_name: rinha-de-backend-api2
    environment:
      <<: *app-env
      PORT: 3000

  worker1:
    <<: *worker-base
    container_name: rinha-de-backend-worker1

  worker2:
    <<: *worker-base
    container_name: rinha-de-backend-worker2

  redis:
    image: redis:7-alpine
    container_name: rinha-de-backend-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "100MB"
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - rinha-de-backend

  redisinsight:
    image: redis/redisinsight
    container_name: rinha-de-backend-redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - rinha-de-backend
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: rinha-de-backend
      RI_REDIS_USERNAME: default
      RI_REDIS_PASSWORD: ${REDIS_PASSWORD}

volumes:
  redisinsight_data:

networks:
  rinha-de-backend:
    driver: bridge
  payment-processor:
    external: true
